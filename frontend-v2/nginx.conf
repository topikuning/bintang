# Konfigurasi nginx utk serve SPA Bintang Finance v2.
# File ini disalin ke /etc/nginx/templates/default.conf.template
# di image nginx:alpine. Saat container start, nginx menjalankan
# envsubst yang mengganti ${PORT} dgn nilai env var Railway.

server {
    listen       ${PORT};
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ---- Cache strategy ----
    # Asset bundle ber-hash (oleh Vite) bisa di-cache panjang.
    # index.html JANGAN di-cache supaya update versi langsung terlihat.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    location = /favicon.ico {
        expires 7d;
        log_not_found off;
        access_log off;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # ---- SPA fallback ----
    # Tiap route React Router (mis. /transactions, /invoices/123) harus
    # di-rewrite ke /index.html supaya tidak 404 saat refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Compression ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/javascript
        application/json
        application/xml
        application/xml+rss
        font/ttf
        font/otf
        image/svg+xml;

    # ---- Security headers ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP minimal -- API & file backend pakai connect-src, sisanya self.
    # Sesuaikan kalau pakai third-party (Sentry, Analytics, dst).

    # ---- Healthcheck ----
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ---- Misc ----
    # Hide nginx version
    server_tokens off;

    # Larger client body utk upload (kalau frontend handle file lokal)
    client_max_body_size 25m;
}
