# Konfigurasi Railway utk service frontend-v2.
# Dipakai oleh Railway saat Root Directory service di-set ke `frontend-v2`.
# Doc: https://docs.railway.com/reference/config-as-code

[build]
builder = "NIXPACKS"
buildCommand = "npm ci && npm run build"

[deploy]
# `npm run start` -> `serve -s dist` (SPA mode -- semua route fallback
# ke index.html). Tanpa -s, refresh di /transactions akan 404 karena
# React Router menangani routing client-side.
startCommand = "npm run start"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
