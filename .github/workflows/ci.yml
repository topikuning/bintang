name: ci

# Auto-check di tiap PR ke main + push langsung ke main.
# Goal: tidak ada regressi build/typecheck/import bisa diam-diam masuk.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel run lama saat ada push baru di branch yg sama -- hemat menit CI.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-v2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-v2/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        # Allow lint to fail without blocking sementara -- repo masih
        # legacy. Hapus `|| true` setelah backlog lint dirapikan.
        run: npm run lint || true

      - name: Build
        run: npm run build

  backend:
    name: backend (import + smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Import smoke test
        # Pastikan semua API & service module dpt di-import (syntax,
        # circular import, SQLAlchemy mapping error ketangkap di sini).
        run: |
          python - <<'PY'
          import importlib, pkgutil
          import app.api.v1 as api_pkg
          import app.services as svc_pkg
          failed = []
          for pkg in (api_pkg, svc_pkg):
              for m in pkgutil.walk_packages(pkg.__path__, pkg.__name__ + "."):
                  try:
                      importlib.import_module(m.name)
                  except Exception as e:
                      failed.append(f"{m.name}: {type(e).__name__}: {e}")
          if failed:
              print("\n".join(failed))
              raise SystemExit(1)
          print("OK: all modules imported")
          PY

      - name: Run tests
        # Tdk fail kalau backend/tests/ kosong -- akan diisi bertahap.
        run: |
          if find tests -name 'test_*.py' -print -quit 2>/dev/null | grep -q .; then
            pytest -q
          else
            echo "no tests yet (skip)"
          fi
