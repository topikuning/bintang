# Alembic configuration utk Bintang.
# Script location relatif ke ini file -- semua versi di app/alembic/versions/.
# DB URL override-able via env -- env.py baca dari app.core.config.

[alembic]
script_location = app/alembic
prepend_sys_path = .
# %% di tanggal: prefix file biar urut + slug singkat
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s
timezone = UTC
# Soft-format versi -- bisa di-format ulang setelah generate.
# truncate_slug_length = 40

# Logging dasar -- override via env juga OK.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
