server {
  listen ${PORT};
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Bila backend dideploy di domain berbeda (Railway), frontend memanggil
  # backend lewat URL absolut (VITE_API_BASE_URL di build time). Block
  # /api di sini hanya jadi fallback untuk skenario docker-compose lokal.
  location /api/ {
    proxy_pass http://backend:8000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    client_max_body_size 25m;
  }
  location /files/ {
    proxy_pass http://backend:8000/files/;
    proxy_set_header Host $host;
  }
  location / {
    try_files $uri /index.html;
  }
}
