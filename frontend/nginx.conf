server {
  listen ${PORT};
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Pakai variable + resolver agar nginx MENUNDA DNS lookup sampai
  # request datang. Penting karena di Railway hostname "backend" tidak
  # resolvable (service terpisah, frontend memanggil URL absolut backend
  # via VITE_API_BASE_URL). Trik ini mencegah error
  # "host not found in upstream" saat container start.
  #
  # 127.0.0.11 = Docker embedded DNS (untuk skenario docker-compose)
  # 1.1.1.1    = Cloudflare DNS fallback
  resolver 127.0.0.11 1.1.1.1 ipv6=off valid=30s;

  location /api/ {
    set $backend_host "backend:8000";
    proxy_pass http://$backend_host/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    client_max_body_size 25m;
  }
  location /files/ {
    set $backend_host "backend:8000";
    proxy_pass http://$backend_host/files/;
    proxy_set_header Host $host;
  }
  location / {
    try_files $uri /index.html;
  }
}
